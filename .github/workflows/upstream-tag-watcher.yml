name: Upstream Tag Watcher

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if image exists"
        type: boolean
        required: false
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: https://github.com/openclaw/openclaw.git

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for merging/pushing if we decide to push back, but here we just build
      packages: write

    steps:
      - name: Checkout kh-oc branch
        uses: actions/checkout@v4
        with:
          ref: kh-oc
          fetch-depth: 0 # Fetch all history for merging

      - name: Fetch upstream tags
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream $UPSTREAM_REPO
          git fetch upstream --tags

      - name: Get latest upstream tag
        id: get_tag
        run: |
          # Get the latest semantic version tag from upstream
          # Using git describe or tag sorting to find the latest version
          # Assuming standard vX.Y.Z format, optionally with -X suffix
          LATEST_TAG=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' | sort -V | tail -n1)

          if [ -z "$LATEST_TAG" ]; then
             echo "::warning::No matching tags found from upstream."
             echo "tag=" >> $GITHUB_OUTPUT
             exit 0
          fi

          echo "Latest upstream tag: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image needs building
        id: check_build
        if: ${{ steps.get_tag.outputs.tag != '' }}
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          FORCE: ${{ inputs.force_build }}
        run: |
          IMAGE_URL="${REGISTRY}/${IMAGE_NAME}:${TAG}-kh"
          echo "Checking for existing image: $IMAGE_URL"

          if [[ "$FORCE" == "true" ]]; then
            echo "Force build enabled."
            echo "build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if docker manifest inspect $IMAGE_URL > /dev/null 2>&1; then
            echo "Image $IMAGE_URL already exists."
            echo "build=false" >> $GITHUB_OUTPUT
          else
            echo "Image $IMAGE_URL does not exist. Triggering build."
            echo "build=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git for Merge
        if: ${{ steps.check_build.outputs.build == 'true' }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Merge upstream tag
        if: ${{ steps.check_build.outputs.build == 'true' }}
        id: merge
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          echo "Attempting to merge upstream tag $TAG into kh-oc"

          # Try to merge. If it conflicts, checking will fail and workflow stops.
          # This is safer than auto-resolving.
          if git merge $TAG --no-edit; then
            echo "Merge successful."
          else
            echo "::error::Merge failed due to conflicts. Manual intervention required."
            exit 1
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.check_build.outputs.build == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        if: ${{ steps.check_build.outputs.build == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.kh
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_tag.outputs.tag }}-kh
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-kh
          cache-from: type=gha
          cache-to: type=gha,mode=max
